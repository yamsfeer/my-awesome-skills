<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>footX — UE 状态机交互文档</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;height:100vh;overflow:hidden;background:#0F172A;color:#E2E8F0;font-family:'Inter',system-ui,sans-serif;font-size:13px}
#sidebar{width:210px;min-width:210px;background:#080E1C;border-right:1px solid #1E293B;overflow-y:auto;display:flex;flex-direction:column}
#sidebar-header{padding:16px 14px 10px;border-bottom:1px solid #1E293B}
#sidebar-header .logo{font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.5px}
#sidebar-header .logo span{color:#F97316}
.group-label{padding:14px 14px 4px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#475569}
.page-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;border-radius:6px;margin:1px 6px;transition:all .15s;color:#94A3B8}
.page-item:hover{background:#1E293B;color:#E2E8F0}
.page-item.active{background:#1E3A5F;color:#60A5FA;font-weight:600}
.page-item .icon{font-size:14px;width:18px;text-align:center}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:44px;background:#080E1C;border-bottom:1px solid #1E293B;display:flex;align-items:center;padding:0 18px;gap:8px;flex-shrink:0}
#topbar .page-name{font-weight:700;color:#fff;font-size:14px}
#topbar .state-name{color:#60A5FA;font-size:13px}
#topbar .sep{color:#334155}
#body{flex:1;display:flex;overflow:hidden}
#graph-panel{flex:1;overflow:hidden;position:relative;background:#0F172A}
#graph-scroll{width:100%;height:100%;overflow:auto;padding:24px}
#graph-svg{display:block}
#right-panel{width:340px;min-width:340px;background:#080E1C;border-left:1px solid #1E293B;display:flex;flex-direction:column;overflow:hidden}
#state-info{padding:14px 16px;border-bottom:1px solid #1E293B;flex-shrink:0}
#state-info .state-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
#state-info .state-desc{color:#94A3B8;font-size:12px;line-height:1.5}
#transitions-section{padding:10px 16px;border-bottom:1px solid #1E293B;flex-shrink:0}
#transitions-section h4{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#475569;margin-bottom:8px}
.trans-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;margin-bottom:4px;cursor:pointer;background:#0F172A;border:1px solid #1E293B;transition:all .15s}
.trans-item:hover{border-color:#2563EB;background:#0D1F3C}
.trans-item .trigger{font-size:11px;color:#F97316;font-family:'JetBrains Mono',monospace;flex:1}
.trans-item .arrow{color:#475569;font-size:10px}
.trans-item .target{font-size:11px;color:#60A5FA;font-family:monospace}
.trans-item.external .target{color:#A78BFA}
#wireframe-section{flex:1;overflow-y:auto;padding:14px 16px}
#wireframe-section h4{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#475569;margin-bottom:10px}
#wireframe-box{background:#0A1520;border:1px solid #1E3A5F;border-radius:8px;padding:12px 10px}
#wireframe-pre{font-family:'JetBrains Mono','Fira Code',monospace;font-size:10.5px;line-height:1.45;color:#4ADE80;white-space:pre;overflow-x:auto}
.no-wireframe{color:#334155;font-style:italic;font-size:12px;padding:8px 0}
/* SVG node styles */
.state-node{cursor:pointer;transition:all .15s}
.state-node rect{rx:8;ry:8;fill:#121F35;stroke:#2D3F5A;stroke-width:1.5;transition:all .2s}
.state-node text{fill:#94A3B8;font-size:11px;font-family:'Inter',system-ui;font-weight:500;user-select:none;pointer-events:none}
.state-node.initial rect{stroke:#10B981;stroke-width:2}
.state-node.initial text{fill:#6EE7B7}
.state-node.selected rect{fill:#0D2B5C;stroke:#2563EB;stroke-width:2.5}
.state-node.selected text{fill:#93C5FD}
.state-node:hover rect{stroke:#3B82F6;fill:#142040}
.state-node.error-type rect{stroke:#EF4444;stroke-dasharray:4 2}
.state-node.error-type text{fill:#FCA5A5}
.state-node.loading-type rect{stroke:#F59E0B;stroke-dasharray:4 2}
.state-node.loading-type text{fill:#FDE68A}
.trans-arrow{fill:none;stroke:#2D3F5A;stroke-width:1.5;marker-end:url(#arrowhead)}
.trans-arrow.external{stroke:#7C3AED;stroke-dasharray:5 3;marker-end:url(#arrowhead-ext)}
.trans-label{font-size:9px;fill:#475569;font-family:monospace;pointer-events:none}
</style>
</head>

// ─── LAYOUT & RENDER ─────────────────────────────────────────────────────────
const NW=130,NH=38,HGAP=28,VGAP=62,PAD=30;
let currentPage=null, currentState=null;

function layoutPage(pageId){
  const pg = PAGES[pageId];
  const states = Object.keys(pg.states);
  const layers = {}, visited = new Set();
  const queue = [[pg.initial, 0]];
  while(queue.length){
    const [s,l] = queue.shift();
    if(visited.has(s)) continue;
    visited.add(s);
    if(!layers[l]) layers[l]=[];
    layers[l].push(s);
    (pg.transitions||[]).filter(t=>t.f===s&&!t.ext&&pg.states[t.t]).forEach(t=>{ if(!visited.has(t.t)) queue.push([t.t,l+1]); });
  }
  states.forEach(s=>{ if(!visited.has(s)){ const mx=Math.max(...Object.keys(layers).map(Number),0); const nl=mx+1; if(!layers[nl]) layers[nl]=[]; layers[nl].push(s); } });
  const pos={};
  Object.entries(layers).forEach(([l,ss])=>{
    const y=parseInt(l)*(NH+VGAP)+PAD;
    const tw=ss.length*(NW+HGAP)-HGAP;
    let x=PAD;
    ss.forEach(s=>{ pos[s]={x,y,cx:x+NW/2,cy:y+NH/2}; x+=NW+HGAP; });
    // center horizontally - skip centering to keep it left-aligned
    _ = tw;
  });
  return pos;
}

function renderGraph(pageId){
  const pg = PAGES[pageId];
  const pos = layoutPage(pageId);
  const allX = Object.values(pos).map(p=>p.x+NW);
  const allY = Object.values(pos).map(p=>p.y+NH);
  const svgW = Math.max(...allX)+PAD;
  const svgH = Math.max(...allY)+PAD;
  const svg = document.getElementById('graph-svg');
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.innerHTML = `
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#2D3F5A"/>
      </marker>
      <marker id="arrowhead-ext" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#7C3AED"/>
      </marker>
    </defs>`;

  // Draw transitions first (behind nodes)
  const arrowsG = document.createElementNS('http://www.w3.org/2000/svg','g');
  arrowsG.setAttribute('id','arrows-g');
  (pg.transitions||[]).forEach((t,i)=>{
    const fp=pos[t.f], tp2=t.ext?null:pos[t.t];
    if(!fp) return;
    const isExt = t.ext || !tp2;
    let x1=fp.cx, y1=fp.y+NH, x2, y2;
    if(!isExt && tp2){
      x2=tp2.cx; y2=tp2.y;
      // Same layer? Use curved path
      if(Math.abs(y1-y2)<10){
        const off=30+i*5;
        const mx=(x1+x2)/2, my=Math.min(fp.y,tp2.y)-off;
        const path=document.createElementNS('http://www.w3.org/2000/svg','path');
        path.setAttribute('d',`M ${x1} ${fp.cy} Q ${mx} ${my} ${x2} ${tp2.cy}`);
        path.setAttribute('class','trans-arrow');
        arrowsG.appendChild(path);
        const lx=mx, ly=my+8;
        const lt=document.createElementNS('http://www.w3.org/2000/svg','text');
        lt.setAttribute('x',lx); lt.setAttribute('y',ly); lt.setAttribute('text-anchor','middle');
        lt.setAttribute('class','trans-label'); lt.textContent=t.label.substring(0,18);
        arrowsG.appendChild(lt);
      } else {
        const path=document.createElementNS('http://www.w3.org/2000/svg','path');
        const cy1=y1+VGAP*0.3, cy2=y2-VGAP*0.3;
        path.setAttribute('d',`M ${x1} ${y1} C ${x1} ${cy1}, ${x2} ${cy2}, ${x2} ${y2}`);
        path.setAttribute('class','trans-arrow');
        arrowsG.appendChild(path);
        const lx=(x1+x2)/2+14, ly=(y1+y2)/2;
        const lt=document.createElementNS('http://www.w3.org/2000/svg','text');
        lt.setAttribute('x',lx); lt.setAttribute('y',ly); lt.setAttribute('class','trans-label');
        lt.textContent=t.label.substring(0,18); arrowsG.appendChild(lt);
      }
    } else {
      // External transition: draw arrow going right off-canvas
      x2=fp.x+NW+50; y2=fp.cy;
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M ${fp.x+NW} ${fp.cy} L ${x2} ${y2}`);
      path.setAttribute('class','trans-arrow external');
      arrowsG.appendChild(path);
      const lt=document.createElementNS('http://www.w3.org/2000/svg','text');
      lt.setAttribute('x',x2+4); lt.setAttribute('y',y2+4);
      lt.setAttribute('class','trans-label'); lt.setAttribute('fill','#7C3AED');
      lt.textContent=`→ ${t.t}`; arrowsG.appendChild(lt);
    }
  });
  svg.appendChild(arrowsG);

  // Draw nodes
  const nodesG = document.createElementNS('http://www.w3.org/2000/svg','g');
  Object.entries(pos).forEach(([sid, p])=>{
    const st=pg.states[sid];
    const isInit=sid===pg.initial;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class',`state-node${isInit?' initial':''}${st.type==='error'?' error-type':''}${st.type==='loading'?' loading-type':''}${sid===currentState?' selected':''}`);
    g.setAttribute('data-state',sid);
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',p.x); rect.setAttribute('y',p.y); rect.setAttribute('width',NW); rect.setAttribute('height',NH);
    rect.setAttribute('rx',8); rect.setAttribute('ry',8);
    g.appendChild(rect);
    const text=document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x',p.cx); text.setAttribute('y',p.cy+4); text.setAttribute('text-anchor','middle');
    text.textContent=sid.length>16?sid.substring(0,15)+'…':sid;
    g.appendChild(text);
    if(isInit){
      const badge=document.createElementNS('http://www.w3.org/2000/svg','text');
      badge.setAttribute('x',p.x+NW-2); badge.setAttribute('y',p.y-3);
      badge.setAttribute('text-anchor','end'); badge.setAttribute('font-size','8');
      badge.setAttribute('fill','#10B981'); badge.textContent='initial';
      g.appendChild(badge);
    }
    g.addEventListener('click',()=>selectState(pageId, sid));
    nodesG.appendChild(g);
  });
  svg.appendChild(nodesG);
}

function selectState(pageId, stateId){
  currentState=stateId;
  const pg=PAGES[pageId];
  const st=pg.states[stateId];
  // Update topbar
  document.getElementById('tb-page').textContent=LABELS[pageId]||pageId;
  document.getElementById('tb-state').textContent=stateId;
  // Update state info
  document.getElementById('si-title').textContent=stateId;
  document.getElementById('si-desc').textContent=st.desc||'—';
  // Update transitions
  const tl=document.getElementById('trans-list');
  tl.innerHTML='';
  const outs=(pg.transitions||[]).filter(t=>t.f===stateId);
  if(!outs.length){ tl.innerHTML='<div style="color:#334155;font-size:11px;padding:4px 0">无出向 Transition</div>'; }
  outs.forEach(t=>{
    const d=document.createElement('div');
    d.className='trans-item'+(t.ext?' external':'');
    d.innerHTML=`<span class="trigger">${t.label}</span><span class="arrow">→</span><span class="target">${t.t}</span>`;
    d.addEventListener('click',()=>{
      if(t.ext && PAGES[t.t]) selectPage(t.t);
      else if(pg.states[t.t]) selectState(pageId, t.t);
    });
    tl.appendChild(d);
  });
  // Update wireframe
  const wfKey=`${pageId}.${stateId}`;
  const pre=document.getElementById('wireframe-pre');
  if(WF[wfKey]){ pre.className=''; pre.textContent=WF[wfKey]; }
  else { pre.className='no-wireframe'; pre.textContent='— 此状态暂无线框图 —'; }
  // Re-render graph to update selection
  renderGraph(pageId);
}

function selectPage(pageId){
  currentPage=pageId;
  currentState=null;
  // Update sidebar active
  document.querySelectorAll('.page-item').forEach(el=>el.classList.toggle('active',el.dataset.page===pageId));
  // Update topbar
  document.getElementById('tb-page').textContent=LABELS[pageId]||pageId;
  document.getElementById('tb-state').textContent='—';
  // Reset right panel
  document.getElementById('si-title').textContent=LABELS[pageId]||pageId;
  document.getElementById('si-desc').textContent=`${Object.keys(PAGES[pageId].states).length} 个状态 · 点击节点查看详情`;
  document.getElementById('trans-list').innerHTML='';
  const pre=document.getElementById('wireframe-pre');
  pre.className='no-wireframe'; pre.textContent='— 点击状态节点查看线框图 —';
  // Render graph
  renderGraph(pageId);
  // Auto-select initial state
  selectState(pageId, PAGES[pageId].initial);
}

// ─── SIDEBAR BUILD ────────────────────────────────────────────────────────────
function buildSidebar(){
  const list=document.getElementById('page-list');
  GROUPS.forEach(g=>{
    const gl=document.createElement('div');
    gl.className='group-label'; gl.textContent=g.name;
    list.appendChild(gl);
    g.pages.forEach(pid=>{
      const item=document.createElement('div');
      item.className='page-item'; item.dataset.page=pid;
      item.innerHTML=`<span class="icon">${ICONS[pid]||'📄'}</span><span>${LABELS[pid]||pid}</span>`;
      item.addEventListener('click',()=>selectPage(pid));
      list.appendChild(item);
    });
  });
}

buildSidebar();
selectPage('LoginPage');
</script>

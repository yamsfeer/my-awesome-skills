# UE 状态机 - FreelanceBook
# 定义每个核心页面的状态、转换条件和异常路径

pages:

  # ========== 登录/注册页 ==========
  AuthPage:
    page_name: AuthPage
    route: "/login | /register"
    description: "用户登录与注册，注册后自动进入 30 天试用"

    initial_state: idle

    states:
      idle:
        description: "待输入状态"
        ui: "表单空白，按钮可点击"
        transitions:
          - event: submit_login
            target: logging_in
            condition: "邮箱和密码非空"
          - event: submit_register
            target: registering
            condition: "姓名、邮箱、密码均非空且密码 ≥ 8 位"
          - event: toggle_mode
            target: idle
            action: "切换登录/注册表单"

      logging_in:
        description: "登录请求进行中"
        ui: "按钮显示 loading，输入框禁用"
        transitions:
          - event: login_success
            target: DashboardPage.loading
            action: "保存 token，跳转仪表板"
          - event: login_error_credentials
            target: login_error
          - event: login_error_network
            target: idle
            action: "Toast 提示网络异常"

      login_error:
        description: "登录失败，账号密码错误"
        ui: "表单顶部红色错误提示"
        transitions:
          - event: retry_input
            target: idle

      registering:
        description: "注册请求进行中"
        ui: "按钮显示 loading，输入框禁用"
        transitions:
          - event: register_success
            target: DashboardPage.loading
            action: "保存 token，进入 30 天试用"
          - event: register_email_exists
            target: register_email_error
          - event: register_error_network
            target: idle
            action: "Toast 提示网络异常"

      register_email_error:
        description: "邮箱已被注册"
        ui: "邮箱字段下方红色提示'该邮箱已注册'"
        transitions:
          - event: change_email
            target: idle

    error_paths:
      - scenario: "网络断开"
        handling: "Toast 提示网络异常，输入内容保留，按钮恢复可点"
      - scenario: "服务器 500"
        handling: "提示'服务繁忙，请稍后重试'，不清空表单"


  # ========== 仪表板页 ==========
  DashboardPage:
    page_name: DashboardPage
    route: "/dashboard"
    description: "收入概览与逾期预警，用户登录后首先看到的页面"

    initial_state: idle

    states:
      idle:
        transitions:
          - event: page_mount
            target: loading

      loading:
        description: "加载统计数据和逾期发票"
        ui: "KPI 区域骨架屏 + 图表骨架屏"
        transitions:
          - event: fetch_success_with_data
            target: success
          - event: fetch_success_empty
            target: empty
            condition: "用户刚注册，没有任何收入记录"
          - event: fetch_error
            target: error

      success:
        description: "正常展示仪表板"
        ui: "KPI 卡片 + 月度收入图 + 逾期发票提醒列表"
        transitions:
          - event: click_overdue_invoice
            target: InvoiceDetailPage.loading
          - event: click_create_invoice
            target: InvoiceCreatePage.idle
          - event: nav_to_clients
            target: ClientListPage.loading
          - event: nav_to_invoices
            target: InvoiceListPage.loading
          - event: nav_to_stats
            target: StatsPage.loading
          - event: pull_refresh
            target: loading

      empty:
        description: "新用户欢迎引导"
        ui: "欢迎插画 + 引导文案 + [创建第一个客户] 按钮"
        transitions:
          - event: click_create_client
            target: ClientCreatePage.idle

      error:
        description: "加载失败"
        ui: "错误提示 + [重试] 按钮"
        transitions:
          - event: retry_tap
            target: loading

    error_paths:
      - scenario: "Token 过期"
        handling: "跳转登录页，登录后回跳 /dashboard"
      - scenario: "服务器 500"
        handling: "显示错误状态，保留上次缓存数据（如有）"


  # ========== 客户列表页 ==========
  ClientListPage:
    page_name: ClientListPage
    route: "/clients"
    description: "浏览和管理所有客户"

    initial_state: idle

    states:
      idle:
        transitions:
          - event: page_mount
            target: loading

      loading:
        ui: "3 个骨架屏卡片"
        transitions:
          - event: fetch_success
            target: success
            condition: "items.length > 0"
          - event: fetch_empty
            target: empty
            condition: "items.length === 0"
          - event: fetch_error
            target: error

      success:
        ui: "客户卡片网格 + 顶部搜索栏 + 状态筛选"
        transitions:
          - event: click_client_card
            target: ClientDetailPage.loading
          - event: click_add_client
            target: ClientCreatePage.idle
          - event: search_input
            target: searching
          - event: filter_change
            target: loading

      searching:
        description: "搜索防抖中"
        ui: "输入框显示搜索中，列表 loading"
        transitions:
          - event: search_debounce_done
            target: success
          - event: search_empty
            target: search_empty

      search_empty:
        ui: "'没有匹配的客户' + [清除搜索]"
        transitions:
          - event: clear_search
            target: success

      empty:
        ui: "空状态插画 + [添加第一个客户] 按钮"
        transitions:
          - event: click_add_client
            target: ClientCreatePage.idle

      error:
        ui: "错误提示 + [重试]"
        transitions:
          - event: retry_tap
            target: loading

    error_paths:
      - scenario: "网络断开"
        handling: "Toast 网络异常，保留列表现有内容"
      - scenario: "Token 过期"
        handling: "跳转登录页，登录后回跳"


  # ========== 客户创建/编辑页 ==========
  ClientCreatePage:
    page_name: ClientCreatePage
    route: "/clients/new | /clients/:id/edit"
    description: "创建新客户或编辑已有客户，支持添加多个联系人"

    initial_state: idle

    states:
      idle:
        description: "表单空白，等待用户输入"
        ui: "客户基本信息表单 + 联系人列表（初始 1 个）"
        transitions:
          - event: submit
            target: submitting
            condition: "客户名称非空"
          - event: add_contact
            target: idle
            action: "动态添加一行联系人"
          - event: remove_contact
            target: idle
            action: "删除对应联系人行"

      submitting:
        description: "提交中"
        ui: "保存按钮 loading，表单禁用"
        transitions:
          - event: submit_success
            target: ClientDetailPage.loading
            action: "Toast 提示'客户已保存'，跳转详情"
          - event: submit_validation_error
            target: validation_error
          - event: submit_network_error
            target: idle
            action: "Toast 提示保存失败"

      validation_error:
        description: "表单校验失败"
        ui: "红色字段提示"
        transitions:
          - event: fix_input
            target: idle

    error_paths:
      - scenario: "离开页面未保存"
        handling: "弹出确认弹窗'有未保存的更改，确认离开？'"


  # ========== 客户详情页 ==========
  ClientDetailPage:
    page_name: ClientDetailPage
    route: "/clients/:id"
    description: "查看客户完整信息、联系人和关联项目"

    initial_state: idle

    states:
      idle:
        transitions:
          - event: page_mount
            target: loading

      loading:
        ui: "头部骨架屏 + 项目列表骨架屏"
        transitions:
          - event: fetch_success
            target: success
          - event: fetch_not_found
            target: not_found
          - event: fetch_error
            target: error

      success:
        ui: "客户头部信息 + 联系人卡片列表 + 项目列表"
        transitions:
          - event: click_edit
            target: ClientCreatePage.idle
          - event: click_archive
            target: archive_confirm
          - event: click_project
            target: ProjectDetailPage.loading
          - event: click_add_project
            target: ProjectCreatePage.idle

      archive_confirm:
        ui: "确认弹窗'归档后不可创建新项目，确认？'"
        transitions:
          - event: confirm_archive
            target: archiving
          - event: cancel
            target: success

      archiving:
        ui: "弹窗按钮 loading"
        transitions:
          - event: archive_success
            target: success
            action: "更新客户状态为 archived，Toast 提示"
          - event: archive_error
            target: success
            action: "Toast 提示归档失败"

      not_found:
        ui: "客户不存在或已删除 + [返回客户列表]"

      error:
        ui: "通用错误提示 + [重试]"
        transitions:
          - event: retry_tap
            target: loading

    error_paths:
      - scenario: "并发删除"
        handling: "归档操作返回 404，提示'客户已被删除'，跳转列表"


  # ========== 项目创建页 ==========
  ProjectCreatePage:
    page_name: ProjectCreatePage
    route: "/projects/new | /projects/:id/edit"
    description: "创建或编辑项目/合同"

    initial_state: idle

    states:
      idle:
        ui: "项目表单（选择客户、名称、合同金额、日期）"
        transitions:
          - event: submit
            target: submitting
            condition: "客户、名称、合同金额、开始日期均非空"
          - event: cancel
            target: ClientDetailPage.success

      submitting:
        ui: "保存按钮 loading"
        transitions:
          - event: submit_success
            target: ProjectDetailPage.loading
            action: "Toast 提示'项目已保存'"
          - event: submit_error
            target: idle
            action: "Toast 提示保存失败"

    error_paths:
      - scenario: "离开页面未保存"
        handling: "弹出确认弹窗"


  # ========== 项目详情页 ==========
  ProjectDetailPage:
    page_name: ProjectDetailPage
    route: "/projects/:id"
    description: "查看项目详情及关联发票列表"

    initial_state: idle

    states:
      idle:
        transitions:
          - event: page_mount
            target: loading

      loading:
        ui: "项目信息骨架屏 + 发票列表骨架屏"
        transitions:
          - event: fetch_success
            target: success
          - event: fetch_not_found
            target: not_found
          - event: fetch_error
            target: error

      success:
        ui: "项目信息卡片 + 发票列表"
        transitions:
          - event: click_edit
            target: ProjectCreatePage.idle
          - event: click_create_invoice
            target: InvoiceCreatePage.idle
          - event: click_invoice
            target: InvoiceDetailPage.loading

      not_found:
        ui: "项目不存在 + [返回]"

      error:
        ui: "错误提示 + [重试]"
        transitions:
          - event: retry_tap
            target: loading

    error_paths:
      - scenario: "无权限"
        handling: "Toast 提示无权限，返回上一页"


  # ========== 发票列表页 ==========
  InvoiceListPage:
    page_name: InvoiceListPage
    route: "/invoices"
    description: "全局发票列表，支持状态筛选和搜索"

    initial_state: idle

    states:
      idle:
        transitions:
          - event: page_mount
            target: loading

      loading:
        ui: "表格骨架屏（4 行）"
        transitions:
          - event: fetch_success
            target: success
            condition: "items.length > 0"
          - event: fetch_empty
            target: empty
          - event: fetch_error
            target: error

      success:
        ui: "发票表格 + 状态筛选 Tabs"
        transitions:
          - event: click_invoice_row
            target: InvoiceDetailPage.loading
          - event: click_create_invoice
            target: InvoiceCreatePage.idle
          - event: filter_status
            target: loading
          - event: scroll_to_bottom
            target: loading_more
            condition: "current_page < total_pages"

      loading_more:
        ui: "表格末尾 loading"
        transitions:
          - event: load_more_success
            target: success
            action: "追加新数据"
          - event: load_more_error
            target: success
            action: "Toast 加载失败"

      empty:
        ui: "空状态 + [创建发票] 按钮"
        transitions:
          - event: click_create_invoice
            target: InvoiceCreatePage.idle

      error:
        ui: "错误提示 + [重试]"
        transitions:
          - event: retry_tap
            target: loading

    error_paths:
      - scenario: "Token 过期"
        handling: "跳转登录页"


  # ========== 发票创建/编辑页 ==========
  InvoiceCreatePage:
    page_name: InvoiceCreatePage
    route: "/invoices/new | /invoices/:id/edit"
    description: "创建或编辑发票，设置金额、到期日和状态"

    initial_state: idle

    states:
      idle:
        ui: "发票表单（选择项目、发票编号、金额、日期）"
        transitions:
          - event: submit
            target: submitting
            condition: "项目、发票编号、金额、开具日期均非空"
          - event: cancel
            target: InvoiceListPage.success

      submitting:
        ui: "保存按钮 loading"
        transitions:
          - event: submit_success
            target: InvoiceDetailPage.loading
            action: "Toast 提示'发票已保存'"
          - event: submit_invoice_no_conflict
            target: idle
            action: "发票编号已存在，红色提示"
          - event: submit_error
            target: idle
            action: "Toast 提示失败"

    error_paths:
      - scenario: "离开页面未保存"
        handling: "确认弹窗"


  # ========== 发票详情页 ==========
  InvoiceDetailPage:
    page_name: InvoiceDetailPage
    route: "/invoices/:id"
    description: "查看发票详情，更新状态，记录收款"

    initial_state: idle

    states:
      idle:
        transitions:
          - event: page_mount
            target: loading

      loading:
        ui: "发票信息骨架屏"
        transitions:
          - event: fetch_success
            target: success
          - event: fetch_not_found
            target: not_found
          - event: fetch_error
            target: error

      success:
        ui: "发票详情 + 状态操作按钮 + 收款记录列表"
        transitions:
          - event: click_mark_sent
            target: updating_status
            condition: "status === draft"
          - event: click_mark_paid
            target: record_payment_dialog
            condition: "status === sent 或 overdue"
          - event: click_mark_overdue
            target: updating_status
            condition: "status === sent"
          - event: click_edit
            target: InvoiceCreatePage.idle
            condition: "status === draft"
          - event: click_add_payment
            target: record_payment_dialog

      updating_status:
        ui: "操作按钮 loading"
        transitions:
          - event: update_success
            target: success
            action: "Toast 状态已更新，刷新发票数据"
          - event: update_error
            target: success
            action: "Toast 更新失败"

      record_payment_dialog:
        ui: "弹窗：收款金额、收款日期、收款方式"
        transitions:
          - event: confirm_payment
            target: saving_payment
          - event: cancel
            target: success

      saving_payment:
        ui: "弹窗保存按钮 loading"
        transitions:
          - event: payment_saved
            target: success
            action: "Toast 收款已记录，若全额付清自动更新状态为 paid"
          - event: payment_error
            target: record_payment_dialog
            action: "Toast 保存失败"

      not_found:
        ui: "发票不存在 + [返回发票列表]"

      error:
        ui: "错误提示 + [重试]"
        transitions:
          - event: retry_tap
            target: loading

    error_paths:
      - scenario: "状态流转非法（如 paid → draft）"
        handling: "后端返回 422，Toast 提示'状态不可逆转'"
      - scenario: "超额收款"
        handling: "警告提示'收款金额超过发票金额，确认继续？'"


  # ========== 收入统计页 ==========
  StatsPage:
    page_name: StatsPage
    route: "/stats"
    description: "收入趋势图表，按年/月/客户维度分析"

    initial_state: idle

    states:
      idle:
        transitions:
          - event: page_mount
            target: loading

      loading:
        ui: "图表骨架屏"
        transitions:
          - event: fetch_success
            target: success
          - event: fetch_empty
            target: empty
          - event: fetch_error
            target: error

      success:
        ui: "年度切换 + 月度柱状图 + 客户构成饼图 + 明细表"
        transitions:
          - event: change_year
            target: loading
          - event: click_client_slice
            target: ClientDetailPage.loading
          - event: toggle_period
            target: loading
            condition: "切换 monthly/quarterly"

      empty:
        ui: "本年度暂无收入数据 + 切换年度"
        transitions:
          - event: change_year
            target: loading

      error:
        ui: "错误提示 + [重试]"
        transitions:
          - event: retry_tap
            target: loading

    error_paths:
      - scenario: "Token 过期"
        handling: "跳转登录页"


  # ========== 税务预估页 ==========
  TaxEstimatePage:
    page_name: TaxEstimatePage
    route: "/tax"
    description: "基于年度收入和扣除项的税务预估计算器"

    initial_state: idle

    states:
      idle:
        transitions:
          - event: page_mount
            target: loading

      loading:
        ui: "结果区域骨架屏"
        transitions:
          - event: fetch_success
            target: success
          - event: fetch_error
            target: error

      success:
        ui: "税务概览卡片 + 专项附加扣除配置表单 + 税率分解表"
        transitions:
          - event: deduction_input_change
            target: recalculating
          - event: save_deductions
            target: saving_deductions

      recalculating:
        description: "扣除项更改后实时重算（防抖 500ms）"
        ui: "结果区域显示轻微 loading 遮罩"
        transitions:
          - event: recalc_done
            target: success

      saving_deductions:
        ui: "保存按钮 loading"
        transitions:
          - event: save_success
            target: success
            action: "Toast 已保存扣除配置"
          - event: save_error
            target: success
            action: "Toast 保存失败"

      error:
        ui: "错误提示 + [重试]"
        transitions:
          - event: retry_tap
            target: loading

    error_paths:
      - scenario: "收入数据为空"
        handling: "正常展示结果（税额为 0），提示'当年暂无收入记录'"

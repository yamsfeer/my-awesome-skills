<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拾物 — 交互状态机查看器</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; }

  .header {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 17px; font-weight: 600; color: #1d1d1f; }
  .header .subtitle { font-size: 13px; color: #6b7280; margin-top: 2px; }
  .header-left { display: flex; flex-direction: column; }

  .page-filter {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .page-filter label { font-size: 13px; color: #6b7280; }
  .page-filter select {
    border: 1px solid #d1d5db;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 14px;
    background: #fff;
    cursor: pointer;
    color: #1d1d1f;
  }

  .main {
    display: grid;
    grid-template-columns: 1fr 380px;
    height: calc(100vh - 57px);
  }

  .diagram-panel {
    padding: 24px;
    overflow: auto;
    background: #fff;
    border-right: 1px solid #e5e7eb;
  }
  .diagram-panel h2 { font-size: 13px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }

  #diagram-container {
    display: flex;
    justify-content: center;
    min-height: 300px;
  }
  #diagram-container svg {
    max-width: 100%;
    height: auto;
  }

  .detail-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #f9fafb;
  }

  .detail-header {
    padding: 20px 20px 16px;
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
  }
  .page-badge {
    display: inline-block;
    background: #eff6ff;
    color: #3b82f6;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 99px;
    margin-bottom: 8px;
  }
  .state-name {
    font-size: 18px;
    font-weight: 700;
    color: #1d1d1f;
    margin-bottom: 4px;
  }
  .state-label { font-size: 13px; color: #6b7280; }
  .trigger-text {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 8px;
    padding: 6px 10px;
    background: #f3f4f6;
    border-radius: 6px;
    font-style: italic;
  }

  .detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }

  .wireframe-container {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .wireframe-title {
    font-size: 11px;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 10px 16px 8px;
    border-bottom: 1px solid #f3f4f6;
  }
  .wireframe pre {
    font-family: 'Courier New', 'Menlo', 'Monaco', monospace;
    font-size: 11.5px;
    line-height: 1.55;
    padding: 14px 16px;
    color: #374151;
    overflow-x: auto;
    white-space: pre;
  }

  .constraints-container { margin-bottom: 8px; }
  .constraints-title {
    font-size: 11px;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .constraint-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 12.5px;
    line-height: 1.4;
  }
  .constraint-item.hard { background: #fef2f2; color: #991b1b; }
  .constraint-item.soft { background: #eff6ff; color: #1e40af; }
  .constraint-item.suggest { background: #f0fdf4; color: #166534; }
  .constraint-badge {
    font-size: 14px;
    flex-shrink: 0;
  }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: #9ca3af;
  }
  .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .state-list {
    padding: 12px;
    background: #f9fafb;
    border-radius: 10px;
    margin-bottom: 12px;
  }
  .state-list-title {
    font-size: 11px;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    padding: 0 4px;
  }
  .state-chip {
    display: inline-block;
    margin: 3px;
    padding: 4px 10px;
    border-radius: 99px;
    font-size: 12px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
    background: #fff;
    color: #4b5563;
    border-color: #e5e7eb;
  }
  .state-chip:hover { border-color: #3b82f6; color: #3b82f6; }
  .state-chip.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

  .transitions-box {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .transitions-box h4 {
    font-size: 11px;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .transition-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #4b5563;
    padding: 3px 0;
  }
  .transition-arrow { color: #d1d5db; }
  .transition-event { color: #3b82f6; font-weight: 500; }
  .transition-target { color: #059669; font-weight: 500; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>拾物（Shiwo）— 交互状态机查看器</h1>
    <div class="subtitle">点击状态节点查看对应线框图</div>
  </div>
  <div class="page-filter">
    <label for="page-select">筛选页面：</label>
    <select id="page-select">
      <option value="all">全部页面</option>
      <option value="HomePage">首页</option>
      <option value="ItemDetailPage">商品详情</option>
      <option value="PublishItemPage">发布商品</option>
      <option value="MessageListPage">私信列表</option>
      <option value="MessageDetailPage">私信详情</option>
      <option value="ProfilePage">个人主页</option>
    </select>
  </div>
</div>

<div class="main">
  <div class="diagram-panel">
    <h2>状态流程图</h2>
    <div id="diagram-container">
      <div style="color:#9ca3af;padding:40px;text-align:center">正在渲染状态图...</div>
    </div>
    <div class="state-list" id="state-chips-container" style="display:none;">
      <div class="state-list-title">快速选择状态</div>
      <div id="state-chips"></div>
    </div>
  </div>

  <div class="detail-panel">
    <div class="detail-header" id="detail-header">
      <div class="empty-state">
        <div class="emoji">👆</div>
        <p>点击左侧状态节点<br>查看对应线框图和约束说明</p>
      </div>
    </div>
    <div class="detail-body" id="detail-body" style="display:none;"></div>
  </div>
</div>

<script>
// ============================================================
// 状态数据
// ============================================================
const STATES = {
  // ── 首页 ──
  "home_loading": {
    page: "首页", pageKey: "HomePage",
    label: "加载中",
    trigger: "页面挂载 / 切换校区 / 切换分类",
    wireframe: `┌─────────────────────────────────┐
│  拾物          [🔍搜索] [📍校区] │
├─────────────────────────────────┤
│  [全部] [教材] [电子] [生活]...  │  分类标签骨架屏
├─────────────────────────────────┤
│  ┌────────┐  ┌────────┐         │
│  │░░░░░░░░│  │░░░░░░░░│         │
│  │░ IMG ░░│  │░ IMG ░░│         │
│  └────────┘  └────────┘         │
│  ░░░░░░░░░░  ░░░░░░░░░░         │
│  ░░░░░░░     ░░░░░░              │
│  ┌────────┐  ┌────────┐         │
│  │░░░░░░░░│  │░░░░░░░░│         │
│  └────────┘  └────────┘         │
├─────────────────────────────────┤
│  [🏠首页] [💬消息] [➕发布] [👤我]│
└─────────────────────────────────┘`,
    constraints: [
      { level: "hard", text: "顶部导航固定不可滚动" },
      { level: "soft", text: "骨架屏卡片数量 = 6 个" }
    ],
    transitions: [
      { event: "fetch_success", target: "home_success" },
      { event: "fetch_empty", target: "home_empty" },
      { event: "fetch_error", target: "home_error" }
    ]
  },

  "home_success": {
    page: "首页", pageKey: "HomePage",
    label: "列表正常展示",
    trigger: "数据加载成功且 items.length > 0",
    wireframe: `┌─────────────────────────────────┐
│  拾物          [🔍搜索] [📍南校区]│

│ [全部▼] [📚教材] [📱电子] [🏠生活]│
├─────────────────────────────────┤
│  ┌────────┐  ┌────────┐         │
│  │  IMG   │  │  IMG   │         │
│  └────────┘  └────────┘         │
│  高等数学(上)  iPhone 13         │

│                                 │

│  英语四级词汇  微积分课本         │

├─────────────────────────────────┤
│  [🏠首页] [💬消息] [➕发布] [👤我]│
└─────────────────────────────────┘`,
    constraints: [
      { level: "hard", text: "价格必须显示（¥ 前缀）" },
      { level: "soft", text: "商品标题最多 2 行，超出截断" },
      { level: "suggest", text: "已售出商品显示灰色遮罩角标" }
    ],
    transitions: [
      { event: "item_tap", target: "→ ItemDetailPage" },
      { event: "category_tab_tap", target: "home_loading" },
      { event: "campus_filter_tap", target: "home_loading" },
      { event: "scroll_to_bottom", target: "home_loading_more" },
      { event: "pull_to_refresh", target: "home_loading" }
    ]
  },

  "home_empty": {
    page: "首页", pageKey: "HomePage",
    label: "无商品",
    trigger: "items.length === 0（当前校区/分类无商品）",
    wireframe: `┌─────────────────────────────────┐
│  拾物          [🔍搜索] [📍南校区]│
├─────────────────────────────────┤
│ [全部▼] [📚教材] [📱电子]...    │
├─────────────────────────────────┤
│                                 │
│          🎒                     │
│                                 │
│    该校区暂无商品                │

│      [ 去发布闲置物 ]            │

├─────────────────────────────────┤
│  [🏠首页] [💬消息] [➕发布] [👤我]│
└─────────────────────────────────┘`,
    constraints: [
      { level: "hard", text: "必须有引导发布的操作按钮" },
      { level: "suggest", text: "建议使用插画提升情感化体验" }
    ],
    transitions: [
      { event: "publish_tap", target: "→ PublishItemPage" }
    ]
  },

  "home_error": {
    page: "首页", pageKey: "HomePage",
    label: "加载失败",
    trigger: "API 返回 4xx/5xx 或网络超时",
    wireframe: `┌─────────────────────────────────┐
│  拾物          [🔍搜索] [📍校区] │
├─────────────────────────────────┤
│                                 │
│          ⚠️                     │
│                                 │
│      加载失败                   │
│      请检查网络后重试            │
│                                 │
│        [ 重 试 ]                │
│                                 │
├─────────────────────────────────┤
│  [🏠首页] [💬消息] [➕发布] [👤我]│
└─────────────────────────────────┘`,
    constraints: [
      { level: "hard", text: "必须显示重试按钮" },
      { level: "soft", text: "错误原因尽量明确（网络/服务器）" }
    ],
    transitions: [
      { event: "retry_tap", target: "home_loading" }
    ]
  },

  "home_loading_more": {
    page: "首页", pageKey: "HomePage",
    label: "加载更多",
    trigger: "下拉到底部",
    wireframe: `┌─────────────────────────────────┐
│  （商品列表，同 success 状态）    │
│                                 │
│  ... （商品卡片）...             │
│                                 │
│   ─────── ⏳ 加载更多 ───────   │

│  [🏠首页] [💬消息] [➕发布] [👤我]│
└─────────────────────────────────┘`,
    constraints: [
      { level: "soft", text: "加载动画在列表末尾，不遮挡内容" }
    ],
    transitions: [
      { event: "load_more_success", target: "home_success" },
      { event: "load_more_error", target: "home_success（Toast 提示）" },
      { event: "no_more_data", target: "home_success_all_loaded" }
    ]
  },

  // ── 商品详情 ──
  "detail_loading": {
    page: "商品详情", pageKey: "ItemDetailPage",
    label: "加载中",
    trigger: "点击商品卡片进入",
    wireframe: `┌─────────────────────────────────┐
│  [← 返回]    商品详情   [⋯更多]  │
├─────────────────────────────────┤
│  ░░░░░░░░░░░░░░░░░░░░░░░░░░░░░ │
│  ░░░░░░░░░░░░░░░░░░░░░░░░░░░░░ │
│  ░░░░░░░░░░░░░░░░░░░░░░░░░░░░░ │
│  ░░░░░░░░  价格占位              │
│  ░░░░░░░░░░░░░░  标题占位        │
│  ░░░░░░░░░░░░  标题第二行        │
│                                 │
│  ░░░░  ░░░░░░░░░░  卖家信息占位  │
├─────────────────────────────────┤
│  [❤ 收藏]       [ 💬 私信卖家 ] │
└─────────────────────────────────┘`,
    constraints: [
      { level: "soft", text: "骨架屏反映真实内容层级结构" }
    ],
    transitions: [
      { event: "fetch_success", target: "detail_success" },
      { event: "fetch_not_found", target: "detail_not_found" },
      { event: "fetch_error", target: "detail_error" }
    ]
  },

  "detail_success": {
    page: "商品详情", pageKey: "ItemDetailPage",
    label: "正常展示",
    trigger: "数据加载成功",
    wireframe: `┌─────────────────────────────────┐
│  [← 返回]    商品详情   [⋯更多]  │

│  [❤ 收藏(23)]   [ 💬 私信卖家 ] │
└─────────────────────────────────┘`,

      { level: "hard", text: "价格醒目展示（主色大字）" },
      { level: "hard", text: "未登录用户无法使用收藏/私信" },

    ],
    transitions: [
      { event: "favor_tap", target: "detail_favoring" },
      { event: "message_tap", target: "→ MessageDetailPage" },
      { event: "seller_tap", target: "→ ProfilePage" },

  "detail_not_found": {
    page: "商品详情", pageKey: "ItemDetailPage",

    wireframe: `┌─────────────────────────────────┐
│  [← 返回]    商品详情            │

      { level: "hard", text: "必须提供返回入口，防止用户无路可走" }

  // ── 发布商品 ──
  "publish_idle": {
    page: "发布商品", pageKey: "PublishItemPage",
    label: "空白表单",
    trigger: "页面初始加载",
    wireframe: `┌─────────────────────────────────┐

// ============================================================
// 应用逻辑
// ============================================================
let currentPageFilter = 'all';
let selectedState = null;

mermaid.initialize({
  startOnLoad: false,
  securityLevel: 'loose',
  theme: 'default',
  stateDiagram: { useMaxWidth: false }
});

async function renderDiagram(pageKey) {
  const container = document.getElementById('diagram-container');
  container.innerHTML = '<div style="color:#9ca3af;padding:40px;text-align:center">正在渲染...</div>';

  const def = DIAGRAMS[pageKey] || DIAGRAMS['all'];
  try {
    const { svg } = await mermaid.render('state-diagram-' + Date.now(), def);
    container.innerHTML = svg;
    bindDiagramClicks(container);
  } catch (e) {
    container.innerHTML = `<div style="color:#ef4444;padding:24px;text-align:center">图表渲染失败：${e.message}</div>`;
  }
}

function bindDiagramClicks(container) {
  const svgEl = container.querySelector('svg');
  if (!svgEl) return;

  svgEl.style.maxWidth = '100%';
  svgEl.style.height = 'auto';

  // 尝试绑定所有 state 节点
  svgEl.querySelectorAll('g').forEach(el => {
    const idAttr = el.getAttribute('id') || '';
    const matchedKey = Object.keys(STATES).find(k => {
      return idAttr === k || idAttr.includes(k) || (el.textContent && el.textContent.trim() === k);
    });
    if (matchedKey) {
      el.style.cursor = 'pointer';
      el.setAttribute('data-state-key', matchedKey);
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        selectState(matchedKey);
      });
    }
  });
}

function selectState(stateKey) {
  selectedState = stateKey;
  const state = STATES[stateKey];
  if (!state) return;

  // 更新 chip 高亮
  document.querySelectorAll('.state-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.key === stateKey);
  });

  // 更新右侧面板
  const header = document.getElementById('detail-header');
  const body = document.getElementById('detail-body');

  header.innerHTML = `
    <div class="page-badge">${state.page}</div>
    <div class="state-name">${stateKey}</div>
    <div class="state-label">${state.label}</div>
    <div class="trigger-text">触发条件：${state.trigger}</div>
  `;

  let constraintsHtml = '';
  if (state.constraints && state.constraints.length) {
    constraintsHtml = `
      <div class="constraints-container">
        <div class="constraints-title">约束标记</div>
        ${state.constraints.map(c => `
          <div class="constraint-item ${c.level}">
            <span class="constraint-badge">${c.level === 'hard' ? '🔴' : c.level === 'soft' ? '🔵' : '🟢'}</span>
            <span>${c.text}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  let transitionsHtml = '';
  if (state.transitions && state.transitions.length) {
    transitionsHtml = `
      <div class="transitions-box">
        <h4>状态转换</h4>
        ${state.transitions.map(t => `
          <div class="transition-item">
            <span class="transition-event">${t.event}</span>
            <span class="transition-arrow">→</span>
            <span class="transition-target">${t.target}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  body.innerHTML = `
    <div class="wireframe-container">
      <div class="wireframe-title">低保真线框图</div>
      <div class="wireframe"><pre>${escapeHtml(state.wireframe)}</pre></div>
    </div>
    ${constraintsHtml}
    ${transitionsHtml}
  `;

  body.style.display = 'block';
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function renderChips(pageKey) {
  const container = document.getElementById('state-chips');
  const wrapper = document.getElementById('state-chips-container');

  const filtered = pageKey === 'all'
    ? Object.keys(STATES)
    : Object.keys(STATES).filter(k => STATES[k].pageKey === pageKey);

  if (filtered.length === 0) {
    wrapper.style.display = 'none';
    return;
  }

  wrapper.style.display = 'block';
  container.innerHTML = filtered.map(k => `
    <span class="state-chip ${selectedState === k ? 'active' : ''}" data-key="${k}" onclick="selectState('${k}')">${k}</span>
  `).join('');
}

// 初始化
document.getElementById('page-select').addEventListener('change', function() {
  currentPageFilter = this.value;
  selectedState = null;
  document.getElementById('detail-header').innerHTML = `
    <div class="empty-state">
      <div class="emoji">👆</div>
      <p>点击左侧状态节点<br>查看对应线框图和约束说明</p>
    </div>
  `;
  document.getElementById('detail-body').style.display = 'none';
  renderDiagram(currentPageFilter);
  renderChips(currentPageFilter);
});

// 启动
renderDiagram('all');
renderChips('all');
